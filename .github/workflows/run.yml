name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Fake Setup
        run: |
          # 1. 全局安装
          npm install -g openclaw || true
          
          # 2. 伪造已安装状态（身份：指挥官）
          mkdir -p ~/.openclaw
          echo '{"name":"指挥官","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          
          # 3. 准备配置
          cp templates/openclaw.template.json openclaw.json || true

      - name: Run
        # 修正启动命令：去掉 start，直接运行并指向配置文件
        run: openclaw --config openclaw.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
