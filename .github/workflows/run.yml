name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          # 忽略 npm 报错继续执行
          npm install || true
          if [ -f "setup.sh" ]; then
            chmod +x setup.sh
            # 关键修复：用 yes 命令自动回车跳过所有交互式提问
            yes "" | ./setup.sh --install || true
          fi

      - name: Prepare Config
        run: |
          # 确保根目录有配置文件，没有就从模板拷
          if [ ! -f "openclaw.json" ]; then
            cp templates/openclaw.template.json openclaw.json || true
          fi

      - name: Run
        # 启动程序
        run: node index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
