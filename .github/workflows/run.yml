name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Start
        run: |
          # 1. 安装基础依赖
          npm install || true
          
          # 2. 强行把配置模板塞进正确位置
          mkdir -p .openclaw
          cp templates/openclaw.template.json openclaw.json || true
          
          # 3. 核心修复：自动回答所有安装提问并直接启动
          # printf 命令会按顺序给脚本喂：回车(名字), 回车(Discord), 回车(更多)
          # 然后直接接上启动命令
          chmod +x setup.sh
          printf "\n\n\n\n\n\n" | ./setup.sh --install || true
          
          # 4. 启动程序
          bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
