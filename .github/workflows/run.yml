name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        with:
          repository: NanoFlow-io/clawdboss-lite

      - name: Get My Config
        uses: actions/checkout@v4
        with:
          path: my_config

      - name: Setup and Run
        run: |
          # 1. 暴力移动：不管代码在哪，通通拉到最外层
          find . -maxdepth 3 -name "package.json" -exec sh -c 'cp -r $(dirname {})/. .' \; || true
          
          # 2. 安装依赖
          npm install --production || true
          
          # 3. 覆盖配置文件
          cp my_config/templates/openclaw.template.json openclaw.json || true
          
          # 4. 强制启动
          node index.js || node dist/index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
