name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Fake Setup
        run: |
          # 安装程序
          npm install -g openclaw || true
          # 伪造“已安装”状态和身份
          mkdir -p ~/.openclaw
          echo '{"name":"指挥官","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          # 把你刚改好的新版 JSON 塞进程序老家
          cp templates/openclaw.template.json ~/.openclaw/openclaw.json || true

      - name: Run
        # 核心修正：使用 gateway 命令并跳过新版的安全审计
        run: openclaw gateway --allow-unconfigured
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
