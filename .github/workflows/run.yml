name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        with:
          repository: NanoFlow-io/clawdboss-lite

      - name: Get My Config
        uses: actions/checkout@v4
        with:
          path: my_config

      - name: Setup Node 22
        # 强制安装程序要求的 Node.js 22 版本
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup and Run
        run: |
          # 1. 自动寻找代码位置并提取到根目录
          find . -maxdepth 3 -name "package.json" -exec sh -c 'cp -rn $(dirname {})/. .' \; || true
          
          # 2. 安装运行环境
          npm install --production || true
          
          # 3. 注入你的配置
          cp my_config/templates/openclaw.template.json openclaw.json || true
          
          # 4. 启动
          node index.js || node dist/index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
