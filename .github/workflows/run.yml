name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        with:
          repository: NanoFlow-io/clawdboss-lite
          path: clawdboss-lite

      - name: Get My Config
        uses: actions/checkout@v4
        with:
          path: my_config

      - name: Setup
        working-directory: ./clawdboss-lite
        run: |
          npm install --production
          cp ../my_config/templates/openclaw.template.json openclaw.json

      - name: Run
        working-directory: ./clawdboss-lite
        run: node index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
