name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Fake Setup
        run: |
          # 1. 绕过源码，直接安装官方现成的运行工具
          npm install -g openclaw || true
          
          # 2. 伪造“已安装”状态，跳过 Your name 提问
          mkdir -p ~/.openclaw
          echo '{"name":"指挥官","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          
          # 3. 把你改好的那个硬核 Prompt 模板同步过来
          cp templates/openclaw.template.json openclaw.json || true

      - name: Run
        # 使用官方工具直接加载你的配置文件启动
        run: openclaw start --config openclaw.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
