name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # 跳过所有 setup 提问，直接安装必要的运行环境
        run: npm install || true

      - name: Prepare Config
        # 强制把你的配置模板同步到程序运行路径
        run: |
          mkdir -p .openclaw
          cp templates/openclaw.template.json openclaw.json || true

      - name: Run
        # 核心启动指令，对接你在 Secrets 填好的钥匙
        run: node index.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
