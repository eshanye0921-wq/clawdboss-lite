name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Force
        run: |
          # 1. 强制安装项目依赖和全局启动器
          npm install || true
          npm install -g pm2 || true

      - name: Prepare Config
        run: |
          # 2. 强制把你的配置模板同步到程序运行路径
          mkdir -p .openclaw
          cp templates/openclaw.template.json openclaw.json || true

      - name: Start Directly
        run: |
          # 3. 绕过脚本，直接尝试各种可能的启动路径
          if [ -f "dist/index.js" ]; then
            node dist/index.js
          elif [ -f "src/index.js" ]; then
            node src/index.js
          else
            node index.js
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
