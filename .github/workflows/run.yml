name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Fake Setup
        run: |
          npm install -g openclaw || true
          mkdir -p ~/.openclaw
          echo '{"name":"指挥官","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          cp templates/openclaw.template.json ~/.openclaw/openclaw.json || true

      - name: Run
        # 加上 --allow-unconfigured 强行启动
        run: openclaw gateway --allow-unconfigured
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
