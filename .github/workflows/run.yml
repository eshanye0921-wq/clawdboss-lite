name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Fake Setup
        run: |
          # 1. 全局安装工具
          npm install -g openclaw || true
          
          # 2. 伪造已安装状态和默认配置路径
          mkdir -p ~/.openclaw
          echo '{"name":"指挥官","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          
          # 3. 【关键】：把配置直接塞进它的默认老家，不给它报错的机会
          cp templates/openclaw.template.json ~/.openclaw/openclaw.json || true
          cp templates/openclaw.template.json openclaw.json || true

      - name: Run
        # 直接盲跑命令，它会自动去 ~/.openclaw/ 找配置
        run: openclaw
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
