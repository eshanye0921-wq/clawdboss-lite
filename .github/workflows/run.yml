name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Force Build Environment
        run: |
          # 1. 彻底把原作者的代码拉下来补齐你的空壳
          git clone https://github.com temp_code
          cp -r temp_code/. . || true
          
          # 2. 安装所有依赖
          npm install --production || true
          
          # 3. 强制覆盖配置文件
          cp templates/openclaw.template.json openclaw.json || true

      - name: Run
        # 这种项目通常有两种启动方式，我们用 || 让它挨个试
        run: node index.js || node dist/index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
