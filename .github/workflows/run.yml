name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        with:
          repository: NanoFlow-io/clawdboss-lite

      - name: Get My Config
        uses: actions/checkout@v4
        with:
          path: my_config

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Force Start
        run: |
          # 1. 提取代码
          find . -maxdepth 3 -name "package.json" -exec sh -c 'cp -rn $(dirname {})/. .' \; || true
          npm install --production || true
          
          # 2. 【核心骗局】：手动创建一个安装成功的标记文件
          # 这样程序启动时就不会再问你 "Your name" 了
          mkdir -p ~/.openclaw
          echo '{"name":"User","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          
          # 3. 注入你的配置
          cp my_config/templates/openclaw.template.json openclaw.json || true
          
          # 4. 直接用核心命令启动，不走那个破脚本
          node dist/index.js --config openclaw.json || node index.js --config openclaw.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
