name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install || true
          if [ -f "setup.sh" ]; then
            chmod +x setup.sh
            ./setup.sh --install
          fi

      - name: Prepare Config
        run: |
          # 如果根目录没找到 openclaw.json，就从模板拷一个
          if [ ! -f "openclaw.json" ]; then
            cp templates/openclaw.template.json openclaw.json
          fi

      - name: Run
        run: node index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
