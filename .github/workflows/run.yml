name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Fake Setup
        run: |
          # 1. 安装最新版程序
          npm install -g openclaw || true
          
          # 2. 伪造身份标记，跳过 Your name 提问
          mkdir -p ~/.openclaw
          echo '{"name":"指挥官","installed":true,"setupAt":"2026-04-24"}' > ~/.openclaw/state.json
          
          # 3. 注入你的原始配置文件
          cp templates/openclaw.template.json ~/.openclaw/openclaw.json || true

      - name: Run
        # 按照日志建议，先执行自我修复，再强行启动
        run: |
          openclaw doctor --fix || true
          openclaw gateway --allow-unconfigured
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
