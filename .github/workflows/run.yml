name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pull Core Code
        # 既然根目录没代码，我们直接强制下载最新内核
        run: |
          npm install -g openclaw
          # 创建必要的配置目录
          mkdir -p .openclaw

      - name: Prepare Config
        # 把你改好的那个带有 System Prompt 的模板拷过去
        run: cp templates/openclaw.template.json openclaw.json || true

      - name: Run
        # 使用 openclaw 命令直接启动，避开所有交互提问
        run: openclaw start --config openclaw.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
