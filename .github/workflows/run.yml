name: Start My Lobster
on:
  workflow_dispatch:
  push:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        # 把命令拆成短句，防止手机粘贴时断行
        run: |
          URL="https://github.com"
          git clone $URL t
          cp -rn t/* .
          npm install --production

      - name: Config
        run: cp templates/openclaw.template.json openclaw.json

      - name: Run
        run: node index.js || bash setup.sh --start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
